name: ML Pipeline

on:
  push:
    branches: [ main, dev ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install mlflow tensorflow

      - name: Pull Data
        run: |
          mkdir -p data
          echo "Mock data for CI/CD" > data/placeholder.txt

      - name: Train
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python train.py | tee output.txt
          grep "RUN_ID:" output.txt | awk '{print $2}' > model_info.txt

      - name: Upload Run Info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Run Info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          pip install mlflow
          python check_threshold.py

      - name: Docker Mock Build
        run: |
          RID=$(cat model_info.txt)
          echo "Building for Run: $RID"
          docker build --build-arg RUN_ID=$RID -t gan-model:latest .