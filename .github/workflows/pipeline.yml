name: ML Pipeline

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install mlflow tensorflow numpy pandas

      - name: Pull Data
        run: |
          mkdir -p data
          echo "mock data" > data/placeholder.txt

      - name: Train
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          # We run train.py and capture the RUN_ID
          python train.py | tee output.txt
          grep "RUN_ID:" output.txt | awk '{print $2}' > model_info.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Docker Mock Build
        run: |
          RID=$(cat model_info.txt)
          echo "Building Docker for Model: $RID"
          docker build --build-arg RUN_ID=$RID -t gan-model:latest .